<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Filler Test Page</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, textarea, select { display: block; margin-top: 4px; padding: 6px; width: 100%; max-width: 400px; }
    input[type="checkbox"], input[type="radio"] { display: inline; width: auto; }
    fieldset { margin-top: 16px; padding: 12px; }
    h2 { margin-top: 24px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <h1>Form Filler Test Page</h1>

  <form id="testForm">

    <!-- Personal Info -->
    <h2>Personal Information</h2>

    <label for="title">Title</label>
    <input type="text" id="title" name="title" placeholder="Mr/Mrs/Ms/Dr">

    <div class="row">
      <div>
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="First name">
      </div>
      <div>
        <label for="middle_initial">Middle Initial</label>
        <input type="text" id="middle_initial" name="middle_initial" placeholder="M.I." maxlength="1">
      </div>
    </div>

    <label for="last_name">Last Name</label>
    <input type="text" id="last_name" name="last_name" placeholder="Last name">

    <label for="full_name">Full Name</label>
    <input type="text" id="full_name" name="full_name" placeholder="Full name">

    <label for="company">Company</label>
    <input type="text" id="company" name="company" placeholder="Company name">

    <label for="position">Position / Job Title</label>
    <input type="text" id="position" name="position" placeholder="Job title">

    <!-- Address -->
    <h2>Address</h2>

    <label for="address1">Address Line 1</label>
    <input type="text" id="address1" name="address_line_1" placeholder="Street address">

    <label for="address2">Address Line 2</label>
    <input type="text" id="address2" name="address_line_2" placeholder="Apt, Suite, Unit">

    <div class="row">
      <div>
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="City">
      </div>
      <div>
        <label for="state">State / Province</label>
        <input type="text" id="state" name="state" placeholder="State">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="country">Country</label>
        <input type="text" id="country" name="country" placeholder="Country">
      </div>
      <div>
        <label for="zip">Zip / Postal Code</label>
        <input type="text" id="zip" name="zip" placeholder="12345">
      </div>
    </div>

    <!-- Phone -->
    <h2>Phone Numbers</h2>

    <label for="home_phone">Home Phone</label>
    <input type="tel" id="home_phone" name="home_phone" placeholder="+1-555-000-0000">

    <label for="work_telephone">Work Telephone</label>
    <input type="tel" id="work_telephone" name="work_telephone" placeholder="+1-555-000-0000 x123">

    <label for="fax">Fax</label>
    <input type="tel" id="fax" name="fax" placeholder="+1-555-000-0000">

    <label for="cell_phone">Cell Phone</label>
    <input type="tel" id="cell_phone" name="cell_phone" placeholder="+1-555-000-0000">

    <!-- Online -->
    <h2>Online</h2>

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="you@example.com">

    <label for="website">Web Site</label>
    <input type="url" id="website" name="website" placeholder="https://...">

    <label for="user_id">User ID</label>
    <input type="text" id="user_id" name="user_id" placeholder="Username">

    <label for="password">Password</label>
    <input type="password" id="password" name="password">

    <!-- Payment -->
    <h2>Payment Information</h2>

    <label for="cc_type">Credit Card Type</label>
    <input type="text" id="cc_type" name="credit_card_type" placeholder="Visa, MasterCard, etc.">

    <label for="cc_number">Credit Card Number</label>
    <input type="text" id="cc_number" name="card_number" placeholder="Card number">

    <div class="row">
      <div>
        <label for="cvv">Card Verification Code (CVV)</label>
        <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4">
      </div>
      <div>
        <label for="card_exp">Card Expiration Date</label>
        <input type="text" id="card_exp" name="card_exp" placeholder="MM/YY">
      </div>
    </div>

    <label for="card_name">Card User Name</label>
    <input type="text" id="card_name" name="card_holder" placeholder="Name on card">

    <label for="card_bank">Card Issuing Bank</label>
    <input type="text" id="card_bank" name="issuing_bank" placeholder="Bank name">

    <label for="card_service_phone">Card Customer Service Phone</label>
    <input type="tel" id="card_service_phone" name="card_service_phone" placeholder="1-800-xxx-xxxx">

    <!-- Identity -->
    <h2>Identity</h2>

    <fieldset>
      <legend>Sex</legend>
      <label><input type="radio" name="sex" value="Male"> Male</label>
      <label><input type="radio" name="sex" value="Female"> Female</label>
      <label><input type="radio" name="sex" value="Other"> Other</label>
    </fieldset>

    <label for="ssn">Social Security Number</label>
    <input type="text" id="ssn" name="ssn" placeholder="XXX-XX-XXXX">

    <label for="driver_license">Driver License Number</label>
    <input type="text" id="driver_license" name="driver_license" placeholder="License number">

    <label for="dob">Date Of Birth</label>
    <input type="date" id="dob" name="date_of_birth">

    <label for="age">Age</label>
    <input type="number" id="age" name="age" min="1" max="120">

    <label for="birth_place">Birth Place</label>
    <input type="text" id="birth_place" name="birth_place" placeholder="City, State">

    <label for="income">Income</label>
    <input type="text" id="income" name="income" placeholder="Annual income">

    <!-- Text Areas -->
    <h2>Text</h2>

    <label for="custom_message">Custom Message</label>
    <textarea id="custom_message" name="custom_message" rows="3" placeholder="Your message"></textarea>

    <label for="comments">Comments</label>
    <textarea id="comments" name="comments" rows="4" placeholder="Additional comments"></textarea>

    <!-- Other Standard Fields -->
    <h2>Other Standard Fields</h2>

    <label for="search">Search</label>
    <input type="search" id="search" name="search" placeholder="Search...">

    <label for="fav-color">Favorite Color</label>
    <input type="color" id="fav-color" name="fav_color">

    <label for="satisfaction">Satisfaction (range)</label>
    <input type="range" id="satisfaction" name="satisfaction" min="0" max="100">

    <label for="meeting-time">Meeting Time</label>
    <input type="time" id="meeting-time" name="meeting_time">

    <label for="month">Month</label>
    <input type="month" id="month" name="month">

    <label for="week">Week</label>
    <input type="week" id="week" name="week">

    <label for="datetime">Date & Time</label>
    <input type="datetime-local" id="datetime" name="datetime">

    <label for="country_select">Country (select)</label>
    <select id="country_select" name="country_select">
      <option value="">-- Select --</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="ca">Canada</option>
      <option value="de">Germany</option>
      <option value="fr">France</option>
      <option value="jp">Japan</option>
    </select>

    <h2>Checkboxes</h2>

    <label><input type="checkbox" name="agree" id="agree"> I agree to terms and conditions</label>
    <label><input type="checkbox" name="newsletter" id="newsletter"> Subscribe to newsletter</label>

    <h2>Fields with aria attributes</h2>

    <span id="comment-label">Leave a comment</span>
    <input type="text" aria-labelledby="comment-label" name="comment">

    <input type="text" aria-label="Nickname" name="nickname">

    <h2>Disabled / Readonly (should be skipped)</h2>

    <label for="readonly-field">Readonly</label>
    <input type="text" id="readonly-field" value="Cannot change" readonly>

    <label for="disabled-field">Disabled</label>
    <input type="text" id="disabled-field" value="Cannot change" disabled>

    <h2>Hidden (should be skipped)</h2>
    <input type="hidden" name="csrf_token" value="abc123">
    <div style="display:none">
      <label for="hidden-div-field">Hidden via CSS</label>
      <input type="text" id="hidden-div-field" name="hidden_css" placeholder="Should be skipped">
    </div>

    <br><br>
    <button type="submit">Submit</button>
  </form>

  <div id="results" style="margin-top: 20px; padding: 10px; background: #f0f0f0; display: none;">
    <h3>Form Values</h3>
    <pre id="form-values"></pre>
  </div>

  <script>
    document.getElementById('testForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const values = {};
      for (const [key, val] of formData.entries()) {
        values[key] = val;
      }
      document.getElementById('form-values').textContent = JSON.stringify(values, null, 2);
      document.getElementById('results').style.display = 'block';
    });
  </script>
</body>
</html>
